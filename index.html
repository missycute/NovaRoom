<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaRoom Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <section class="start-screen" id="startScreen">
    <div class="start-card">
      <div class="start-logo">N</div>
      <h1>NovaRoom</h1>
      <p>Choose a username to enter the chat room.</p>

      <form id="startForm" class="start-form">
        <input
          type="text"
          id="usernameInput"
          placeholder="Enter your username..."
          maxlength="24"
          autocomplete="off"
        />
        <button type="submit" class="enter-btn">Enter Chat</button>
      </form>
    </div>
  </section>

  <div class="chat-app hidden" id="chatApp">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">N</div>
        <div>
          <h1>NovaRoom</h1>
          <p>Live community chat</p>
        </div>
      </div>

      <div class="sidebar-card">
        <span class="label">ROOM</span>
        <h2># main-lounge</h2>
        <p>Real-time Firestore room</p>
      </div>

      <div class="sidebar-card">
        <span class="label">YOU</span>
        <h2 id="sidebarUsername">Guest</h2>
        <p>Your active username in this room</p>
      </div>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <div>
          <h2>Main Lounge</h2>
          <p>Welcome to the room</p>
        </div>

        <div class="header-actions">
          <button class="ghost-btn" id="membersBtn" type="button">Members</button>
          <button class="primary-btn" type="button">Invite</button>
        </div>
      </header>

      <section class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">💬</div>
          <h3>No messages yet</h3>
          <p>Start the conversation.</p>
        </div>
      </section>

      <div class="composer-wrap">
        <div class="emoji-panel" id="emojiPanel">
          <button class="emoji-item" type="button">😀</button>
          <button class="emoji-item" type="button">😎</button>
          <button class="emoji-item" type="button">😍</button>
          <button class="emoji-item" type="button">🥶</button>
          <button class="emoji-item" type="button">🔥</button>
          <button class="emoji-item" type="button">✨</button>
          <button class="emoji-item" type="button">💜</button>
          <button class="emoji-item" type="button">🖤</button>
          <button class="emoji-item" type="button">💫</button>
          <button class="emoji-item" type="button">🎵</button>
          <button class="emoji-item" type="button">🌙</button>
          <button class="emoji-item" type="button">⚡</button>
        </div>

        <form class="composer" id="chatForm">
          <button
            class="emoji-toggle"
            id="emojiToggle"
            type="button"
            aria-label="Open emoji panel"
            aria-expanded="false"
          >
            <span class="arrow-icon">➜</span>
          </button>

          <input
            type="text"
            id="messageInput"
            placeholder="Write a message..."
            autocomplete="off"
          />

          <button class="send-btn" type="submit">Send</button>
        </form>
      </div>
    </main>

    <aside class="members-panel" id="membersPanel">
      <div class="members-header">
        <h3>Members</h3>
        <button class="close-members" id="closeMembers" type="button">✕</button>
      </div>

      <div class="members-count">
        <span>Online users</span>
        <strong id="membersCount">0</strong>
      </div>

      <div class="members-list" id="membersList"></div>
    </aside>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
